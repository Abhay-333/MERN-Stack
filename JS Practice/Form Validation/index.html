<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        weight: 100%;
      }

      body {
        color: white;
        background-color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .box {
        display: flex;
        padding: 1rem;
        align-items: center;
        gap: 2rem;
        flex-direction: column;
        background-color: black;
        border: 2px solid white;
        border-radius: 10px;
        height: 600px;
        width: 500px;
        overflow: auto;
      }

      /* .box ul {
      } */

      body button {
        border-radius: 10px;
        padding: 0.7rem;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <form>
        
        <div class="userName">
          <label>UserName: </label>
          <input required type="text" value="Sujal.;'"  placeholder="Enter your UserName"></input>
        </div>
        
        <div class="password">
          <label>Password: </label>
          <input required type="password" value="test" placeholder="Password"></input>
        </div>

        <input type="submit">
      </form>      
    </div>
    <script src="script.js"></script>
  </body>
</html>
